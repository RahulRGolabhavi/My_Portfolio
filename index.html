    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-secondary: #12121c;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: linear-gradient(180deg, rgba(30, 30, 40, 0.7) 0%, rgba(20, 20, 30, 0.7) 100%);
            --card-arrow: rgba(40, 40, 50, 0.5);
            --nav-bg: rgba(10, 10, 15, 0.8);
            --border-light: rgba(255, 255, 255, 0.1);
            --bg-subtle: rgba(255, 255, 255, 0.05);
            --bg-input: rgba(255, 255, 255, 0.03);
        }

        .light-theme {
            --bg-dark: #ffffff;
            --bg-secondary: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(0, 0, 0, 0.1);
            --primary: #4f46e5;
            --secondary: #9333ea;
            --accent: #db2777;
            --text-main: #0f172a;
            --text-muted: #475569;
            --card-bg: linear-gradient(180deg, rgba(255, 255, 255, 0.8) 0%, rgba(240, 245, 255, 0.8) 100%);
            --card-arrow: rgba(255, 255, 255, 0.8);
            --nav-bg: rgba(255, 255, 255, 0.8);
            --border-light: rgba(0, 0, 0, 0.15);
            --bg-subtle: rgba(0, 0, 0, 0.05);
            --bg-input: rgba(0, 0, 0, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Google Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            width: 100%;
            max-width: 100vw;
            line-height: 1.6;
        }

        html {
            overflow-x: hidden;
            width: 100%;
            scroll-behavior: smooth;
        }

        #root {
            overflow-x: hidden;
            width: 100%;
            position: relative;
            min-height: 100vh;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .nav-brand {
            font-family: 'Google Sans', sans-serif;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        /* Glassmorphism Utilities */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-5px);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 10px 40px -10px rgba(99, 102, 241, 0.15);
        }

        /* Text Gradients */
        .text-gradient {
            background: linear-gradient(to right, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
            animation: gradientAnim 5s linear infinite;
        }

        @keyframes gradientAnim {
            0% {
                background-position: 0% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* Ambient Glow */
        .glow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            pointer-events: none;
            z-index: -1;
        }

        .glow-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
        }

        .glow-1 {
            top: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: rgba(99, 102, 241, 0.3);
        }

        .glow-2 {
            top: 40%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: rgba(168, 85, 247, 0.2);
        }

        .glow-3 {
            bottom: -10%;
            left: 20%;
            width: 600px;
            height: 600px;
            background: rgba(236, 72, 153, 0.2);
        }

        .light-theme .glow-circle {
            opacity: 0.15;
        }

        /* Theme Toggle Slider */
        .theme-switch-wrapper {
            display: flex;
            align-items: center;
            margin-right: 1.5rem;
        }

        .theme-switch {
            position: relative;
            width: 60px;
            height: 32px;
            background: rgba(120, 120, 150, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            padding: 4px;
        }

        .theme-switch:hover {
            border-color: var(--primary);
        }

        .theme-knob {
            width: 24px;
            height: 24px;
            background: var(--text-main);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--bg-dark);
            font-size: 0.8rem;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .theme-switch.dark .theme-knob {
            transform: translateX(0);
        }

        .theme-switch.light .theme-knob {
            transform: translateX(26px);
        }

        /* Typography */
        .section-title {
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 3rem;
        }

        /* Layouts */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        section {
            padding: 6rem 0;
            position: relative;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1rem 0;
            transition: all 0.3s ease;
        }

        nav.scrolled {
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 0.8rem 0;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo img {
            height: 40px;
            width: auto;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .nav-logo img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            text-decoration: none;
            font-family: 'Google Sans', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding-top: 80px;
        }

        .hero-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .hero-text h1 {
            font-size: 2rem;
            line-height: 1.15;
            margin-bottom: 1rem;
        }

        .hero-text h3.hero-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .hero-text p {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            max-width: 500px;
        }

        .hero-avatar {
            width: 200px;
            height: 200px;
            overflow: hidden;
            border: 3px solid rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.3);
            margin-bottom: 1.5rem;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation: morphing 10s ease-in-out infinite;
        }

        @keyframes morphing {
            0% {
                border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            }

            25% {
                border-radius: 58% 42% 75% 25% / 76% 46% 54% 24%;
            }

            50% {
                border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%;
            }

            75% {
                border-radius: 33% 67% 58% 42% / 63% 68% 32% 37%;
            }

            100% {
                border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            }
        }

        .hero-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Terminal Card */
        .terminal-perspective {
            perspective: 1000px;
        }

        .terminal-card {
            background: linear-gradient(145deg, rgba(15, 15, 25, 0.95), rgba(10, 10, 20, 0.98));
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 1rem;
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.03, 0.98, 0.52, 0.99), box-shadow 0.4s ease;
            will-change: transform;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .terminal-card:hover {
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.4),
                0 0 40px rgba(99, 102, 241, 0.15),
                0 0 80px rgba(168, 85, 247, 0.08);
        }

        .light-theme .terminal-card {
            background: linear-gradient(145deg, rgba(30, 30, 50, 0.95), rgba(20, 20, 40, 0.98));
        }

        .terminal-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.9rem 1.2rem;
            background: rgba(255, 255, 255, 0.04);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .terminal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .terminal-dot.red {
            background: #ff5f57;
        }

        .terminal-dot.yellow {
            background: #ffbd2e;
        }

        .terminal-dot.green {
            background: #28c840;
        }

        .terminal-title {
            margin-left: 0.75rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            font-family: 'Courier New', monospace;
        }

        .terminal-body {
            padding: 1.5rem;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.9;
            min-height: 280px;
            color: #e2e8f0;
        }

        .terminal-line {
            opacity: 0;
            animation: terminalFadeIn 0.5s ease forwards;
        }

        .terminal-prompt {
            color: #28c840;
        }

        .terminal-cmd {
            color: #e2e8f0;
        }

        .terminal-comment {
            color: #6b7280;
        }

        .terminal-keyword {
            color: #c084fc;
        }

        .terminal-string {
            color: #34d399;
        }

        .terminal-function {
            color: #60a5fa;
        }

        .terminal-bracket {
            color: #fbbf24;
        }

        .terminal-cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: #28c840;
            animation: blink 1s infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }

        @keyframes terminalFadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* About Section */
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
        }

        .about-text h3 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: var(--text-main);
        }

        .about-text p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-size: 1.05rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .stat-card {
            padding: 1.5rem;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            font-family: 'Google Sans', sans-serif;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Skills Section */
        .skills-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr));
            gap: 2rem;
        }

        .skill-category {
            padding: 2rem;
        }

        .skill-category h3 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .skill-category h3 i {
            color: var(--secondary);
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .skill-tag {
            padding: 0.5rem 1rem;
            background: var(--bg-subtle);
            border: 1px solid var(--border-light);
            border-radius: 2rem;
            font-size: 0.9rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex;
            align-items: center;
            position: relative;
            z-index: 1;
            overflow: hidden;
            cursor: default;
        }

        .skill-tag::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .skill-tag:hover {
            transform: translateY(-4px) scale(1.05);
            border-color: rgba(168, 85, 247, 0.4);
            box-shadow: 0 10px 20px -10px rgba(168, 85, 247, 0.5);
        }

        .skill-tag:hover::before {
            opacity: 1;
        }

        .skill-icon-img {
            width: 18px;
            height: 18px;
            margin-right: 6px;
            object-fit: contain;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .skill-icon-i {
            margin-right: 6px;
            font-size: 16px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .skill-tag:hover .skill-icon-img,
        .skill-tag:hover .skill-icon-i {
            transform: scale(1.2) rotate(5deg);
        }

        /* Projects Section */
        .project-card {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
        }

        .project-content {
            padding: 2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .project-category {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--secondary);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .project-title {
            font-size: 1.4rem;
            margin-bottom: 1rem;
        }

        .project-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .project-links {
            display: flex;
            gap: 1rem;
            margin-top: auto;
        }

        /* Education & Experience */
        .timeline {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
        }

        .timeline::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 20px;
            width: 2px;
            background: rgba(168, 85, 247, 0.15);
            border-radius: 2px;
        }

        .timeline-progress {
            position: absolute;
            top: 0;
            left: 20px;
            width: 2px;
            background: linear-gradient(to bottom, var(--primary), var(--secondary));
            border-radius: 2px;
            z-index: 1;
        }

        .timeline-item {
            position: relative;
            padding-left: 60px;
            margin-bottom: 3rem;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 11px;
            top: 5px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--bg-dark);
            border: 4px solid var(--secondary);
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
            z-index: 2;
        }

        .timeline-content {
            padding: 2rem;
            position: relative;
        }

        .timeline-content::after {
            content: '';
            position: absolute;
            top: 15px;
            left: -10px;
            border-width: 10px 10px 10px 0;
            border-style: solid;
            border-color: transparent var(--card-arrow) transparent transparent;
        }

        .timeline-date {
            font-size: 0.9rem;
            color: var(--secondary);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        /* Contact Section */
        .contact-content {
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border-light);
            border-radius: 0.75rem;
            color: var(--text-main);
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--bg-subtle);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        textarea.form-control {
            min-height: 150px;
            resize: vertical;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 3rem 0;
        }

        .social-link {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            font-size: 1.2rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-link:hover {
            background: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
        }

        /* Footer */
        footer {
            padding: 3rem 0;

        const { useState, useEffect, useRef } = React;

        // Custom hook for scroll animation
        const useScrollReveal = () => {
            const ref = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                        }
                    },
                    { threshold: 0.1, rootMargin: "0px 0px -50px 0px" }
                );

                if (ref.current) {
                    observer.observe(ref.current);
                }

                return () => {
                    if (ref.current) observer.unobserve(ref.current);
                };
            }, []);

            return ref;
        };

        const RevealOnScroll = ({ children, className = '' }) => {
            const ref = useScrollReveal();
            return (
                <div ref={ref} className={`fade-in ${className}`}>
                    {children}

        // --- Terminal Card Component ---
        const TerminalCard = () => {
            const cardRef = useRef(null);
            const codeSnippet =
                `public class Experience {

    String current = "Training @ Tap Academy";
    String previous = "Developer @ UST";
    // Back End
    String[] backend = { "Java", "Spring Boot", "REST APIs" };
    
    // Front End
    String[] frontend = { "React", "HTML5", "CSS3", "JavaScript" };
    
    // Database
    String[] database = { "MySQL" };
    boolean openToWork = true;

    public void engineerSolutions() {
        while (requirements.evolve()) {
            architectSystems();
            optimizePerformance();
            deliverValue();
        }
    }
}`;

            const [typedCode, setTypedCode] = useState('');
            const [isDeleting, setIsDeleting] = useState(false);
            const [typingSpeed, setTypingSpeed] = useState(50);

            useEffect(() => {
                let ticker = setInterval(() => {
                    tick();
                }, typingSpeed);
                return () => clearInterval(ticker);
            }, [typedCode, isDeleting, typingSpeed]);

            const tick = () => {
                let updatedText = isDeleting
                    ? codeSnippet.substring(0, typedCode.length - 1)
                    : codeSnippet.substring(0, typedCode.length + 1);

                setTypedCode(updatedText);

                if (isDeleting) {
                    setTypingSpeed(15); // Fast delete
                } else {
                    setTypingSpeed(40); // Normal typing
                }

                if (!isDeleting && updatedText === codeSnippet) {
                    setIsDeleting(true);
                    setTypingSpeed(3500); // Long pause when fully typed
                } else if (isDeleting && updatedText === '') {
                    setIsDeleting(false);
                    setTypingSpeed(1000); // Pause before starting again
                }
            };

            // Syntax highlighting for the typed code
            const highlightJava = (code) => {
                return code
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/\b(public|class|private|return|new|boolean|true|false|void|int|double)\b/g, '<span class=\'terminal-keyword\'>$1</span>')
                    .replace(/(\bString\b|String\[\]|\bExperience\b)/g, '<span class=\'terminal-function\'>$1</span>')
                    .replace(/("[^"]*")/g, '<span class=\'terminal-string\'>$1</span>')
                    .replace(/(@\w+)/g, '<span style=\'color: #fbbf24\'>$1</span>')
                    .replace(/([{}()])/g, '<span class=\'terminal-bracket\'>$1</span>')
                    .replace(/(\/{2}.*)/g, '<span class=\'terminal-comment\'>$1</span>');
            };

            const handleMouseMove = (e) => {
                const card = cardRef.current;
                if (!card) return;
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = ((y - centerY) / centerY) * -12;
                const rotateY = ((x - centerX) / centerX) * 12;
                card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.03, 1.03, 1.03)`;
            };

            const handleMouseLeave = () => {
                const card = cardRef.current;
                if (!card) return;
                card.style.transform = 'rotateX(0) rotateY(0) scale3d(1, 1, 1)';
            };

            return (
                <div className="terminal-perspective">
                    <div
                        className="terminal-card"
                        ref={cardRef}
                        onMouseMove={handleMouseMove}
                        onMouseLeave={handleMouseLeave}
                    >
                        <div className="terminal-header">
                            <div className="terminal-dot red"></div>
                            <div className="terminal-dot yellow"></div>
                            <div className="terminal-dot green"></div>
                            <span className="terminal-title">Experience.java</span>
                        </div>
                        <div className="terminal-body">
                            <pre style={{ margin: 0, whiteSpace: 'pre-wrap', wordBreak: 'break-word' }}>
                                <code dangerouslySetInnerHTML={{ __html: highlightJava(typedCode) }} />
                                <span className="terminal-cursor"></span>
                            </pre>
                        </div>
                    </div>
                </div>
            );
        };

            return (
                <section id="projects">
                    <div className="container">
                        <RevealOnScroll>
                            <h2 className="section-title">Featured <span className="text-gradient">Projects</span></h2>
                        </RevealOnScroll>

                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(min(100%, 350px), 1fr))', gap: '2rem' }}>
                            {projects.map((project, idx) => (
                                <RevealOnScroll key={idx}>
                                    <div className="glass-card project-card">
                                        <div className="project-content">
                                            <span className="project-category">{project.category}</span>
                                            <h3 className="project-title">{project.title}</h3>

                                            {project.award && (
                                                <div style={{ background: 'rgba(236, 72, 153, 0.1)', color: 'var(--accent)', padding: '0.4rem 0.8rem', borderRadius: '4px', fontSize: '0.8rem', marginBottom: '1rem', display: 'inline-block', border: '1px solid rgba(236, 72, 153, 0.3)' }}>
                                                    <i className="fa-solid fa-trophy" style={{ marginRight: '5px' }}></i>
                                                    {project.award}
                                                </div>
                                            )}

                                            <p className="project-desc">{project.description}</p>

                                            <div className="skill-tags" style={{ marginBottom: '1.5rem', marginTop: 'auto' }}>
                                                {project.tech.map((t, i) => (
                                                    <SkillTag key={i} skill={t} style={{ fontSize: '0.8rem', padding: '0.2rem 0.6rem' }} />
                                                ))}
                                            </div>

                                        </div>
                                    </div>
                                </RevealOnScroll>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Education = () => {
            const [lineHeight, setLineHeight] = useState(0);
            const timelineRef = useRef(null);

            useEffect(() => {
                const handleScroll = () => {
                    if (!timelineRef.current) return;
                    const rect = timelineRef.current.getBoundingClientRect();
                    const windowHeight = window.innerHeight;

                    const start = windowHeight * 0.7;
                    let progress = (start - rect.top) / rect.height;
                    progress = Math.max(0, Math.min(1, progress));
                    setLineHeight(progress * 100);
                };

                window.addEventListener('scroll', handleScroll);
                handleScroll();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <section id="education" style={{ background: 'rgba(255,255,255,0.01)' }}>
                    <div className="container">
                        <RevealOnScroll>
                            <h2 className="section-title">Education & <span className="text-gradient">Experience</span></h2>
                        </RevealOnScroll>

                        <div className="timeline" ref={timelineRef}>
                            <div className="timeline-progress" style={{ height: `${lineHeight}%` }}></div>
                            <RevealOnScroll>
                                <div className="timeline-item">
                                    <div className="glass-card timeline-content">
                                        <div className="timeline-date">Current</div>
                                        <h3 style={{ fontSize: '1.4rem', marginBottom: '0.5rem' }}>Java Full Stack Development Trainee</h3>
                                        <div style={{ color: 'var(--primary)', marginBottom: '1rem', fontWeight: '500' }}>Tap Academy</div>
                                        <p style={{ color: 'var(--text-muted)' }}>Expanding expertise in Core Java, Spring Boot, MySQL, CSS, and HTML. Focused on deploying production-level architectures, understanding intricate scalable web logic, and mastering rigorous backend engineering best practices.</p>
                                    </div>
                                </div>
                            </RevealOnScroll>

                            <RevealOnScroll>
                                <div className="timeline-item">
                                    <div className="glass-card timeline-content">
                                        <div className="timeline-date">Previous Role</div>
                                        <h3 style={{ fontSize: '1.4rem', marginBottom: '0.5rem' }}>Software Developer</h3>
                                        <div style={{ color: 'var(--primary)', marginBottom: '1rem', fontWeight: '500' }}>UST</div>
                                        <p style={{ color: 'var(--text-muted)' }}>Contributed heavily to "ServeEase," a comprehensive service marketplace. Designed and shipped features crossing user reservations, provider analytics, and core admin dashboards seamlessly united via RESTful architectures.</p>
                                    </div>
                                </div>
                            </RevealOnScroll>

                            <RevealOnScroll>
                                <div className="timeline-item">
                                    <div className="glass-card timeline-content">
                                        <div className="timeline-date">Graduated 2024</div>
                                        <h3 style={{ fontSize: '1.4rem', marginBottom: '0.5rem' }}>B.E in Computer Science</h3>
                                        <div style={{ color: 'var(--primary)', marginBottom: '1rem', fontWeight: '500' }}>Sri Sairam College of Engineering | CGPA: 8.0</div>
                                        <ul style={{ color: 'var(--text-muted)', marginLeft: '1.2rem', marginTop: '0.5rem', display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                                            <li>Received the <strong>Best Project Award</strong> for AI/ML IoT integration at CarpeDiem '24.</li>
                                            <li>Organized and conducted AR/VR immersive technology workshops to elevate technical literacy among peers.</li>
                                        </ul>
                                    </div>
                                </div>
                            </RevealOnScroll>
                        </div>
                    </div>
                </section>
            );
        };

        const Contact = () => {
            const [result, setResult] = useState("");

            const handleSubmit = async (e) => {
                e.preventDefault();
                setResult("Sending...");
                const formData = new FormData(e.target);

                // Add your Web3Forms access key here.
                // Request it at: https://web3forms.com/
                formData.append("access_key", "7b6f0f5c-8a2c-49bd-b685-2bc423d9f757");

                const response = await fetch("https://api.web3forms.com/submit", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    setResult("Form Submitted Successfully!");
                    e.target.reset();
                    setTimeout(() => setResult(""), 5000);
                } else {
                    console.log("Error", data);
                    setResult(data.message);
                }
            };

            return (
                <section id="contact">
                    <div className="container">
                        <RevealOnScroll>
                            <h2 className="section-title">Let's <span className="text-gradient">Work Together!</span></h2>
                        </RevealOnScroll>

                        <RevealOnScroll>
                            <div className="social-links">
                                <a href="https://www.linkedin.com/in/rahul-r-golabhavi/" target="_blank" rel="noopener noreferrer" className="social-link" aria-label="LinkedIn">
                                    <i className="fa-brands fa-linkedin-in"></i>
                                </a>
                                <a href="https://github.com/RahulRGolabhavi" target="_blank" rel="noopener noreferrer" className="social-link" aria-label="GitHub">
                                    <i className="fa-brands fa-github"></i>
                                </a>
                                <a href="mailto:rahulgolabhavi@gmail.com" className="social-link" aria-label="Email">
                                    <i className="fa-solid fa-envelope"></i>
                                </a>
                            </div>
                        </RevealOnScroll>

                        <RevealOnScroll>
                            <div className="glass-card contact-content" style={{ padding: '3rem' }}>
                                <form onSubmit={handleSubmit}>
                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1.5rem' }}>
                                        <div className="form-group">
                                            <label htmlFor="contact-name">Name</label>
                                            <input type="text" id="contact-name" name="name" className="form-control" required placeholder="John Doe" />
                                        </div>
                                        <div className="form-group">
                                            <label htmlFor="contact-email">Email</label>
                                            <input type="email" id="contact-email" name="email" className="form-control" required placeholder="john@example.com" />
                                        </div>
                                    </div>
                                    <div className="form-group">
                                        <label htmlFor="contact-subject">Subject</label>
                                        <input type="text" id="contact-subject" name="subject" className="form-control" required placeholder="Opportunity Collaboration" />
                                    </div>
                                    <div className="form-group">
                                        <label htmlFor="contact-message">Message</label>
                                        <textarea id="contact-message" name="message" className="form-control" required placeholder="Tell me about your project..."></textarea>
                                    </div>
                                    <button type="submit" className="btn btn-primary" style={{ width: '100%', marginBottom: '1rem' }}>Send Message</button>
                                    {result && <p style={{ textAlign: 'center', color: result.includes("Error") ? 'var(--accent)' : 'var(--secondary)' }}>{result}</p>}
                                </form>
                            </div>
                        </RevealOnScroll>
                    </div>
                </section>
            );
        };

        const Footer = () => {
            return (
                <footer>
                    <div className="container">
                        <h2 style={{ fontFamily: 'Google Sans', fontSize: '2.2rem', marginBottom: '1rem', letterSpacing: '2px' }}>
                            RAHUL R GOLABHAVI
                        </h2>
                        <p style={{ color: 'var(--text-muted)', marginBottom: '2rem' }}>
                            Building Intelligent, Scalable, and Impactful Software for the Future
                        </p>
                        <div style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>
                            &copy; {new Date().getFullYear()} Rahul R Golabhavi. All Rights Reserved.
                        </div>
                    </div>
                </footer>
            );
        };

        const App = () => {
            const [isDarkMode, setIsDarkMode] = useState(() => {
                const saved = localStorage.getItem('portfolio-theme');
                return saved ? saved === 'dark' : true;
            });

            useEffect(() => {
                localStorage.setItem('portfolio-theme', isDarkMode ? 'dark' : 'light');
                if (isDarkMode) {
                    document.body.classList.remove('light-theme');
                } else {
                    document.body.classList.add('light-theme');
                }
            }, [isDarkMode]);

            const toggleTheme = () => {
                setIsDarkMode(!isDarkMode);
            };

            return (
                <>
                    {/* Ambient Glow Effects */}
                    <div className="glow-container">
                        <div className="glow-circle glow-1"></div>
                        <div className="glow-circle glow-2"></div>
                        <div className="glow-circle glow-3"></div>
                    </div>

                    {/* Header */}
                    <header>
                        <Navbar isDarkMode={isDarkMode} toggleTheme={toggleTheme} />
                        <Hero />
                    </header>

                    {/* Main Body */}
                    <main>
                        <About />
                        <Skills />
                        <Projects />
                        <Education />
                        <Contact />
                    </main>

                    {/* Footer */}
                    <Footer />
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
