<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul R Golabhavi | Full Stack Developer</title>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-secondary: #12121c;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .nav-brand {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Glassmorphism Utilities */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        .glass-card {
            background: linear-gradient(180deg, rgba(30, 30, 40, 0.7) 0%, rgba(20, 20, 30, 0.7) 100%);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-5px);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 10px 40px -10px rgba(99, 102, 241, 0.15);
        }

        /* Text Gradients */
        .text-gradient {
            background: linear-gradient(to right, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
            animation: gradientAnim 5s linear infinite;
        }

        @keyframes gradientAnim {
            0% {
                background-position: 0% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        /* Ambient Glow */
        .glow-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
            pointer-events: none;
        }

        .glow-1 {
            top: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: rgba(99, 102, 241, 0.3);
        }

        .glow-2 {
            top: 40%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: rgba(168, 85, 247, 0.2);
        }

        .glow-3 {
            bottom: -10%;
            left: 20%;
            width: 600px;
            height: 600px;
            background: rgba(236, 72, 153, 0.2);
        }

        /* Typography */
        .section-title {
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 3rem;
        }

        /* Layouts */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        section {
            padding: 6rem 0;
            position: relative;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1rem 0;
            transition: all 0.3s ease;
        }

        nav.scrolled {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 0.8rem 0;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo img {
            height: 40px;
            width: auto;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .nav-logo img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            text-decoration: none;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding-top: 80px;
        }

        .hero-content {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 4rem;
            align-items: center;
        }

        .hero-text h1 {
            font-size: 4rem;
            line-height: 1.1;
            margin-bottom: 1rem;
        }

        .hero-text p {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            max-width: 500px;
        }

        .hero-image {
            position: relative;
        }

        .hero-image-wrapper {
            position: relative;
            z-index: 1;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            overflow: hidden;
            border: 4px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.3);
            animation: morphing 10s ease-in-out infinite;
        }

        @keyframes morphing {
            0% {
                border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            }

            25% {
                border-radius: 58% 42% 75% 25% / 76% 46% 54% 24%;
            }

            50% {
                border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%;
            }

            75% {
                border-radius: 33% 67% 58% 42% / 63% 68% 32% 37%;
            }

            100% {
                border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            }
        }

        .hero-image img {
            width: 100%;
            height: auto;
            object-fit: cover;
            display: block;
        }

        /* About Section */
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
        }

        .about-text h3 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: var(--text-main);
        }

        .about-text p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-size: 1.05rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .stat-card {
            padding: 1.5rem;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Skills Section */
        .skills-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .skill-category {
            padding: 2rem;
        }

        .skill-category h3 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .skill-category h3 i {
            color: var(--secondary);
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .skill-tag {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .skill-tag:hover {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }

        /* Projects Section */
        .project-card {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
        }

        .project-content {
            padding: 2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .project-category {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--secondary);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .project-title {
            font-size: 1.4rem;
            margin-bottom: 1rem;
        }

        .project-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .project-links {
            display: flex;
            gap: 1rem;
            margin-top: auto;
        }

        /* Education & Experience */
        .timeline {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
        }

        .timeline::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 20px;
            width: 2px;
            background: linear-gradient(to bottom, var(--primary), var(--secondary));
            border-radius: 2px;
        }

        .timeline-item {
            position: relative;
            padding-left: 60px;
            margin-bottom: 3rem;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 11px;
            top: 5px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--bg-dark);
            border: 4px solid var(--secondary);
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
            z-index: 2;
        }

        .timeline-content {
            padding: 2rem;
            position: relative;
        }

        .timeline-content::after {
            content: '';
            position: absolute;
            top: 15px;
            left: -10px;
            border-width: 10px 10px 10px 0;
            border-style: solid;
            border-color: transparent rgba(40, 40, 50, 0.5) transparent transparent;
        }

        .timeline-date {
            font-size: 0.9rem;
            color: var(--secondary);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        /* Contact Section */
        .contact-content {
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            color: var(--text-main);
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        textarea.form-control {
            min-height: 150px;
            resize: vertical;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 3rem 0;
        }

        .social-link {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            font-size: 1.2rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-link:hover {
            background: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
        }

        /* Footer */
        footer {
            padding: 3rem 0;
            text-align: center;
            border-top: 1px solid var(--glass-border);
            margin-top: 4rem;
        }

        /* Animations */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 992px) {
            .hero-content {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .hero-text p {
                margin: 0 auto 2rem;
            }

            .about-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                /* simple mobile approach */
            }

            .hero-text h1 {
                font-size: 2.5rem;
            }

            .section-title {
                font-size: 2rem;
            }

            .timeline::before {
                left: 0;
            }

            .timeline-item {
                padding-left: 30px;
            }

            .timeline-item::before {
                left: -9px;
            }

            .timeline-content::after {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom hook for scroll animation
        const useScrollReveal = () => {
            const ref = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                        }
                    },
                    { threshold: 0.1, rootMargin: "0px 0px -50px 0px" }
                );

                if (ref.current) {
                    observer.observe(ref.current);
                }

                return () => {
                    if (ref.current) observer.unobserve(ref.current);
                };
            }, []);

            return ref;
        };

        const RevealOnScroll = ({ children, className = '' }) => {
            const ref = useScrollReveal();
            return (
                <div ref={ref} className={`fade-in ${className}`}>
                    {children}
                </div>
            );
        };

        // --- COMPONENTS ---

        const Navbar = () => {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setScrolled(window.scrollY > 50);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollToTop = () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <nav className={scrolled ? 'scrolled' : ''}>
                    <div className="container nav-container">
                        <div className="nav-logo" onClick={scrollToTop}>
                            <img src="https://i.pinimg.com/736x/a3/dd/21/a3dd212965b4d0a0d9abc1004b524c69.jpg" alt="Logo" />
                        </div>
                        <ul className="nav-links">
                            <li><a href="#about">About</a></li>
                            <li><a href="#skills">Skills</a></li>
                            <li><a href="#projects">Projects</a></li>
                            <li><a href="#education">Education</a></li>
                            <li><a href="#contact">Contact</a></li>
                        </ul>
                        <div className="nav-actions">
                            <a href="https://drive.google.com/file/d/1Tdc3S2m_D35fR_YZAOz5EgMADDOlj8Kb/view?usp=drive_link" target="_blank" rel="noopener noreferrer" className="btn btn-primary">
                                <i className="fa-solid fa-download" style={{ marginRight: '8px' }}></i>
                                Resume
                            </a>
                        </div>
                    </div>
                </nav>
            );
        };

        const Hero = () => {
            const [text, setText] = useState('');
            const fullText = "Full Stack Developer";
            const [isDeleting, setIsDeleting] = useState(false);
            const [loopNum, setLoopNum] = useState(0);
            const [typingSpeed, setTypingSpeed] = useState(150);

            const roles = ["Full Stack Developer", "Java Developer"];

            useEffect(() => {
                let ticker = setInterval(() => {
                    tick();
                }, typingSpeed);
                return () => clearInterval(ticker);
            }, [text, isDeleting]);

            const tick = () => {
                let i = loopNum % roles.length;
                let fullRole = roles[i];
                let updatedText = isDeleting ? fullRole.substring(0, text.length - 1) : fullRole.substring(0, text.length + 1);

                setText(updatedText);

                if (isDeleting) setTypingSpeed(50);
                else setTypingSpeed(100);

                if (!isDeleting && updatedText === fullRole) {
                    setIsDeleting(true);
                    setTypingSpeed(2000); // pause at end
                } else if (isDeleting && updatedText === '') {
                    setIsDeleting(false);
                    setLoopNum(loopNum + 1);
                    setTypingSpeed(200);
                }
            };

            return (
                <section className="hero" id="home">
                    <div className="container hero-content">
                        <RevealOnScroll className="hero-text">
                            <h3>Hi, I'm Rahul R Golabhavi</h3>
                            <h1>
                                Passionate About Building <span className="text-gradient">Efficient</span> & <br />
                                <span className="text-gradient">Scalable</span> Software
                            </h1>
                            <h3 style={{ fontSize: '1.5rem', marginBottom: '2rem', height: '30px', color: 'var(--secondary)' }}>
                                I am a {text}<span style={{ borderRight: '2px solid var(--secondary)', animation: 'blink 1s infinite' }}></span>
                            </h3>
                            <p>Computer Science graduate and detail-oriented developer, crafting functional systems and modern scalable architectures for the future.</p>
                            <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap' }}>
                                <a href="#contact" className="btn btn-primary">Get In Touch</a>
                                <a href="#projects" className="btn btn-outline">View Work</a>
                            </div>
                        </RevealOnScroll>

                        <RevealOnScroll className="hero-image">
                            <div className="hero-image-wrapper">
                                <img src="https://image2url.com/r2/default/images/1773586051047-1ce33ab6-3eb5-42db-8da8-6ab856fe175b.png" alt="Rahul R Golabhavi" />
                            </div>
                        </RevealOnScroll>
                    </div>
                </section>
            );
        };

        const About = () => {
            return (
                <section id="about">
                    <div className="container">
                        <RevealOnScroll>
                            <h2 className="section-title">About <span className="text-gradient">Me</span></h2>
                        </RevealOnScroll>

                        <div className="about-grid">
                            <RevealOnScroll className="about-text">
                                <div className="glass-card" style={{ padding: '2rem' }}>
                                    <h3>My Journey</h3>
                                    <p>I am a Computer Science graduate with practical experience in building full-stack web applications using Java and the Spring Boot ecosystem. My primary focus is backend development, where I design scalable RESTful APIs, manage application logic, and build reliable server-side systems.</p>
                                    <p>Graduating with an 8.0 CGPA from Sri Sairam College of Engineering, I developed a robust foundation in OOP, data structures, and backend architecture.</p>
                                    <p>During my tenure at UST, I contributed to ServeEase—a full-stack service marketplace. I implemented vital booking systems, provider management modules, and administrative controls, heavily integrating RESTful APIs to ensure rapid, reliable communication between the complex frontend and the backend.</p>
                                    <p>I am currently refining my expertise at Tap Academy, mastering advanced paradigms in Core Java, Spring Boot, MySQL, and responsive frontend design to build production-grade web solutions.</p>
                                </div>
                            </RevealOnScroll>

                            <RevealOnScroll>
                                <div className="glass-card" style={{ padding: '2rem', marginBottom: '2rem' }}>
                                    <h3>Quick Info</h3>
                                    <ul style={{ listStyle: 'none', display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                                        <li style={{ display: 'flex', gap: '1rem', alignItems: 'center' }}>
                                            <i className="fa-solid fa-location-dot" style={{ color: 'var(--primary)', width: '20px' }}></i>
                                            <span>Bangalore, Karnataka, India</span>
                                        </li>
                                        <li style={{ display: 'flex', gap: '1rem', alignItems: 'center' }}>
                                            <i className="fa-solid fa-envelope" style={{ color: 'var(--primary)', width: '20px' }}></i>
                                            <span>rahulgolabhavi@gmail.com</span>
                                        </li>
                                        <li style={{ display: 'flex', gap: '1rem', alignItems: 'center' }}>
                                            <i className="fa-solid fa-briefcase" style={{ color: 'var(--primary)', width: '20px' }}></i>
                                            <span>Open for Opportunities</span>
                                        </li>
                                    </ul>
                                </div>

                                <div className="stats-grid">
                                    <div className="glass-card stat-card">
                                        <div className="stat-number">1+</div>
                                        <div className="stat-label">Years Commited</div>
                                    </div>
                                    <div className="glass-card stat-card">
                                        <div className="stat-number">3+</div>
                                        <div className="stat-label">Projects Built</div>
                                    </div>
                                    <div className="glass-card stat-card">
                                        <div className="stat-number">100%</div>
                                        <div className="stat-label">Dedication</div>
                                    </div>
                                    <div className="glass-card stat-card">
                                        <div className="stat-number">∞</div>
                                        <div className="stat-label">Passion</div>
                                    </div>
                                </div>
                            </RevealOnScroll>
                        </div>
                    </div>
                </section>
            );
        };

        const Skills = () => {
            const skillCategories = [
                {
                    title: "Frontend Development",
                    icon: "fa-code",
                    skills: ["HTML5", "CSS3", "JavaScript"]
                },
                {
                    title: "Backend Development",
                    icon: "fa-server",
                    skills: ["Java", "Spring Boot", "RESTful APIs"]
                },
                {
                    title: "Database",
                    icon: "fa-database",
                    skills: ["MySQL"]
                },
                {
